services:
  broker:
    build:
      context: ./broker-service
    restart: always
    ports:
      - "8080:8080"
    environment:
      RABBITMQ_URL: "amqp://admin:password@rabbitmq:5672/"
    depends_on:
      - authentication-service
      - rabbitmq
  
  authentication-service:
    build:
      context: ./authentication-service
    restart: always
    ports:
      - "8081:8080"
    environment:
      - DSN=host=postgres user=postgres password=postgres dbname=authentication_service_db port=5432 sslmode=disable connect_timeout=5
    depends_on:
      - postgres
  
  logger-service:
    build:
      context: ./logger-service
    restart: always
    ports:
      - "8082:8080"
    environment:
      MONGO_URI: "mongodb://admin:password@mongo:27017/?authSource=admin"
      MONGO_DB: "logs"
      RABBITMQ_URL: "amqp://admin:password@rabbitmq:5672/"
    depends_on:
      - mongo
      - rabbitmq
  
  mailer-service:
    build:
      context: ./mailer-service
    restart: always
    environment:
      MAIL_DOMAIN: localhost
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_ENCRYPTION: none
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      FROM_FROMNAME: "John Smith"
      FROM_FROMADDRESS: john.smith@example.com
      RABBITMQ_URL: "amqp://admin:password@rabbitmq:5672/"
    depends_on:
      - rabbitmq
   
  postgres:
    image: postgres:18.3
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=authentication_service_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    
  mongo:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    
  mailhog:
    image: mailhog/mailhog:latest
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"
    
  listener:
      build:
        context: ./listener-service
      restart: always
      environment:
        RABBITMQ_URL: "amqp://admin:password@rabbitmq:5672/"
      depends_on:
        - rabbitmq

  rabbitmq:
    image: rabbitmq:4-management
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  postgres_data:
  mongo_data:
  rabbitmq_data: